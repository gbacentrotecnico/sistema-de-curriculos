name: Deploy para DockerHub

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Criar arquivo .env para o Build
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
          echo "VITE_MINIO_ENDPOINT=${{ secrets.VITE_MINIO_ENDPOINT }}" >> .env
          echo "VITE_MINIO_ACCESS_KEY=${{ secrets.VITE_MINIO_ACCESS_KEY }}" >> .env
          echo "VITE_MINIO_SECRET_KEY=${{ secrets.VITE_MINIO_SECRET_KEY }}" >> .env
          echo "VITE_MINIO_BUCKET=${{ secrets.VITE_MINIO_BUCKET }}" >> .env

      - name: Build e Push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            gbacentrotecnico/rh-workspace:latest
            gbacentrotecnico/rh-workspace:${{ github.run_number }}
